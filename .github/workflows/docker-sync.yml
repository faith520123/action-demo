name: Sync to Aliyun
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ziyiwoaini
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
      - run: |
          docker pull nginx:latest
          docker tag nginx:latest registry.cn-beijing.aliyuncs.com/ziyiwoaini/ziiyiwoaini-1:latest
          docker push registry.cn-beijing.aliyuncs.com/ziyiwoaini/ziiyiwoaini-1:latest
